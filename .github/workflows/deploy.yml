name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '5. fintastiq-frontend/package-lock.json'

      - name: Install dependencies
        run: cd '5. fintastiq-frontend' && npm ci

      - name: Build
        run: cd '5. fintastiq-frontend' && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g vercel@latest
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: team_nrKENYhngPh44sx6WBiQgoRx
          VERCEL_PROJECT_ID: prj_nyYGZoE3eQ4xMZIF1hMzgvRybA3L

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        run: |
          npm install -g vercel@latest
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_nrKENYhngPh44sx6WBiQgoRx
          VERCEL_PROJECT_ID: prj_nyYGZoE3eQ4xMZIF1hMzgvRybA3L
